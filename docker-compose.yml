services:
  api:
    build:
      context: ./easystock-api
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      # Tushare Pro Token（勿提交仓库）：启用后 /api/picks、/api/stocks/{code}、/api/sectors* 走实时接口
      # TUSHARE_TOKEN: "your-token"
      # TUSHARE_TRADE_DATE: "20250425"
      # TUSHARE_TRADE_DATE_FALLBACK: "20250424"
      # TUSHARE_PICK_LIMIT: "15"
      # TUSHARE_PICKS_CACHE_MINUTES: "5"
      # TUSHARE_SECTOR_CACHE_MINUTES: "15"
      # TUSHARE_SECTOR_MIN_STOCKS: "5"
      # TUSHARE_SECTOR_MAX: "80"
    restart: unless-stopped

  web:
    build:
      context: ./easyStock
      dockerfile: docker/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped
